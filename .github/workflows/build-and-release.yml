name: Kdenlive KF6 Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kdeneon/all-kf6-qt6:latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Missing Build Tools
        run: |
          apt update
          apt install -y build-essential git cmake ninja-build gettext \
            python3-dev swig libarchive-dev libsdl2-dev libxml2-dev \
            libavdevice-dev librtaudio-dev libsox-dev libmovit-dev \
            librubberband-dev libebur128-dev libopencv-dev \
            libsamplerate0-dev libvidstab-dev libexif-dev libpango1.0-dev \
            libvorbis-dev libopentimelineio-dev || echo "Some dev-tools already present"

      - name: Build & Install MLT v7
        run: |
          git clone --depth 1 --recurse-submodules https://github.com/mltframework/mlt.git
          cd mlt && mkdir build && cd build
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release -DMOD_QT=OFF -DMOD_QT6=ON -DMOD_GLAXNIMATE_QT6=ON -DCMAKE_INSTALL_PREFIX=/usr
          ninja install
          cd ../..

      - name: Build Kdenlive
        run: |
          mkdir build && cd build
          cmake .. -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRELEASE_BUILD=ON \
            -DKDE_INSTALL_USE_QT_SYS_PATHS=ON \
            -DBUILD_TESTING=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr
          ninja
          DESTDIR=/tmp/kdenlive_install ninja install

      - name: Package AppImage
        run: |
          apt install -y wget file
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export AppDir=/tmp/kdenlive_install
          VERSION=$(date +%Y%m%d)-${GITHUB_SHA:0:7}
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeploy-x86_64.AppImage --appdir $AppDir --plugin qt --output appimage
          mv Kdenlive-x86_64.AppImage kdenlive-${VERSION}-x86_64.AppImage

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rel-${{ github.run_id }}
          name: "Kdenlive KF6 Container Build"
          files: "*.AppImage"
          body: |
            Successfully built using KDE Neon KF6 Docker Image.
            Hash: ${{ github.sha }}
